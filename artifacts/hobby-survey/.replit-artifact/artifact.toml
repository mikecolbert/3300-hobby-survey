kind = "web"
previewPath = "/"
title = "Hobbies Survey"
version = "1.0.0"
id = "artifacts/hobby-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25649
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hobby-survey run dev"

[services.env]
PORT = "25649"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hobby-survey", "run", "build"]
publicDir = "artifacts/hobby-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
